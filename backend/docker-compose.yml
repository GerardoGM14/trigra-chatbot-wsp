# Servicios para desarrollo local. Levanta con:
#   docker compose up -d
# En la VPS se sustituyen por instalaciones nativas (apt install postgresql redis-server).
# Los volúmenes son nombrados (no bind-mounts), así puedes `docker compose down -v`
# para empezar limpio sin tocar tu disco.

services:
  postgres:
    image: postgres:17-alpine
    container_name: wsp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wsp_user
      POSTGRES_PASSWORD: wsp_password
      POSTGRES_DB: wsp_control
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wsp_user -d wsp_control"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wsp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
